<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Kutoškovi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0a1a3a;
  font-family: 'Playfair Display', serif;
}

.word {
  position: absolute;
  color: #ffffff;
  font-size: 14px;
  white-space: nowrap;
  letter-spacing: 0.5px;
  opacity: 0;
  animation: float linear infinite;
  text-shadow: 0 0 6px rgba(255,255,255,0.7);
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
.hearts {
  position: fixed;
  top: 20px;
  left: 0;
  width: 100%;
  height: 120px;
  pointer-events: none;
  z-index: 10;
}
.hearts span {
  position: absolute;
  font-size: 64px;
  color: #ff5c7a;
  text-shadow: 0 0 12px rgba(255, 92, 122, 0.6);
  animation: floatHeart 4s ease-in-out infinite;
}
.hearts span:nth-child(1) { left: 5%; top: 10px; animation-delay: 0s; }
.hearts span:nth-child(2) { left: 15%; top: 40px; animation-delay: 1s; }
.hearts span:nth-child(3) { left: 25%; top: 5px; animation-delay: 2s; }
.hearts span:nth-child(4) { left: 35%; top: 35px; animation-delay: 0.5s; }
.hearts span:nth-child(5) { left: 45%; top: 15px; animation-delay: 1.5s; }
.hearts span:nth-child(6) { left: 55%; top: 45px; animation-delay: 2.5s; }
.hearts span:nth-child(7) { left: 65%; top: 10px; animation-delay: 1s; }
.hearts span:nth-child(8) { left: 75%; top: 30px; animation-delay: 2s; }
.hearts span:nth-child(9) { left: 85%; top: 5px; animation-delay: 0.3s; }
.hearts span:nth-child(10){ left: 10%; top: 60px; animation-delay: 1.2s; }
.hearts span:nth-child(11){ left: 30%; top: 70px; animation-delay: 2.2s; }
.hearts span:nth-child(12){ left: 50%; top: 60px; animation-delay: 0.7s; }
.hearts span:nth-child(13){ left: 70%; top: 70px; animation-delay: 1.7s; }
.hearts span:nth-child(14){ left: 90%; top: 50px; animation-delay: 2.7s; }
.hearts span:nth-child(15){ left: 60%; top: 20px; animation-delay: 0.9s; }

 @keyframes floatHeart {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(8px); }
  100% { transform: translateY(0px); }
}
.title {
  position: fixed;
  top: 150px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  color: #ffffff;
  letter-spacing: 1px;
  z-index: 9;
  pointer-events: none;

  text-shadow: 0 0 8px rgba(255,255,255,0.4);
}
</style>
</head>

<body>
<div class="title">
  30 důvodů, proč tě miluju
</div>  
<div class="hearts">
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
  <span>❤️</span>
</div>
  
<script>
const messages = [
  "jsi šíleně hot",
  "jsi smarťoš",
  "zpíváš nejlepší písničky o našem životě",
  "jsi best lil rapík",
  "vonínuješ",
  "učíš mě házet spinybíns v 10",
  "můžu se ti se vším svěřit",
  "pomáháš všem okolo sebe",
  "jsi pozornej a empatickej",
  "máš dobré srdíčko",
  "jsi milující přítel",
  "jsi na mě nejvíc hodnín",
  "jsi trpělivej když mi nejdou videohry",
  "chráníš mě když spinybínsuju",
  "krásně se staráš o to, abys zrealizoval nejhezčí domeček na světě",
  "jsi nejšikovnější programátor",
  "máš best dark humor a jsi velmi funny",
  "seš roztomilej když mluvíš o jídle",
  "nejkrásněji se usmíváš",
  "můžeme spolu vést filosofický debaty",
  "chodíš se mnou na procházky, i když nerad chodíš ven",
  "jsi čestnej, věrnej a férovej člověk",
  "v každém vidíš to nejlepší a učíš to i mě",
  "ukázal jsi mi spoustu cool filmíků a serošků",
  "můžu s tebou být sama sebou a být just a silly girl",
  "vždycky mě podržíš, když mám krizi nebo jsem smutná",
  "podporuješ mě v mých snech, koníčcích a malých radostech",
  "jsi rozhodnej a silnej v tom co chceš a co děláš",
  "jsi pracovitej a jdeš si za svými sny",
  "můžu se na tebe se vším spolehnout"
];

let currentIndex = 0;
  
function createWord() {
  const word = document.createElement("div");
  word.className = "word";
  word.innerText = messages[currentIndex];
  currentIndex = (currentIndex + 1) % messages.length;
  word.style.animation = "none"; 
  word.style.fontSize = (18 + Math.random() * 12) + "px";
  document.body.appendChild(word);

  const padding = 20;
  const maxLeft = window.innerWidth - word.offsetWidth - padding;
  const safeLeft = Math.max(padding, maxLeft);

  word.style.left = Math.random() * (safeLeft - padding) + padding + "px";

  
  word.style.animation = `float ${12 + Math.random() * 10}s linear infinite`;

  setTimeout(() => {
    word.remove();
  }, 8000);
}
function start() {
  setInterval(createWord, 3000);
}

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(start);
} else {
  start();
}
  </script>

</body>
</html>
