<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Proč jsi kutošek ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at 30% 30%, #1a2a6c, #0b0f2f, #000814);
  font-family: 'Poppins', sans-serif;
}

/* jemné hvězdičky */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.08;
  animation: moveBg 80s linear infinite;
}

@keyframes moveBg {
  from { transform: translate(0, 0); }
  to { transform: translate(-200px, -200px); }
}

.word {
  position: absolute;
  color: #e0e6ff;
  font-size: 18px;
  opacity: 0;
  animation: float linear infinite;
  text-shadow: 0 0 12px rgba(173, 216, 255, 0.8);
}

@keyframes float {
  0% {
    transform: translateY(100vh);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  80% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<script>
const messages = [
  "jsi šíleně hot",
  "jsi smarťoš",
  "zpíváš nejlepší písničky o našem životě",
  "jsi best lil rapík",
  "vonínuješ",
  "učíš mě házet spinybíns v 10",
  "můžu se ti se vším svěřit",
  "pomáháš všem okolo sebe",
  "jsi pozornej a empatickej",
  "máš dobré srdíčko",
  "jsi milující přítel",
  "jsi na mě nejvíc hodnín",
  "jsi trpělivej když mi nejdou videohry",
  "chráníš mě když spinybínsuju",
  "krásně se staráš o to, abys zrealizoval nejhezčí domeček na světě",
  "jsi nejšikovnější programátor",
  "máš best dark humor a jsi velmi funny",
  "seš roztomilej když mluvíš o jídle",
  "nejkrásněji se usmíváš",
  "můžeme spolu vést filosofický debaty",
  "chodíš se mnou na procházky, i když nerad chodíš ven",
  "jsi čestnej, věrnej a férovej člověk",
  "v každém vidíš to nejlepší a učíš to i mě",
  "ukázal jsi mi spoustu cool filmíků a serošků",
  "můžu s tebou být sama sebou a být just a silly girl",
  "vždycky mě podržíš, když mám krizi nebo jsem smutná",
  "podporuješ mě v mých snech, koníčcích a malých radostech",
  "jsi rozhodnej a silnej v tom co chceš a co děláš",
  "jsi pracovitej a jdeš si za svými sny",
  "můžu se na tebe se vším spolehnout"
];

function createWord() {
  const word = document.createElement("div");
  word.className = "word";
  word.innerText = messages[Math.floor(Math.random() * messages.length)];

  word.style.left = Math.random() * 100 + "vw";
  word.style.animationDuration = (8 + Math.random() * 10) + "s";
  word.style.fontSize = (14 + Math.random() * 26) + "px";

  document.body.appendChild(word);

  setTimeout(() => {
    word.remove();
  }, 18000);
}

setInterval(createWord, 350);
</script>

</body>
</html>
